<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>CodeMind — 코딩 연습</title>
  <!-- 분리된 CSS 불러오기 -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo"><div class="nav-logo-dot"></div> CodeMind</a>
    <div class="nav-links">
      <a href="ai.html" class="nav-link">🤖 AI 튜터</a>
      <a href="note.html" class="nav-link">📝 오답노트</a>
      <a href="code.html" class="nav-link active">💻 코딩 연습</a>
      <a href="board.html" class="nav-link">👥 커뮤니티</a>
    </div>
  </nav>

  <div style="padding: 30px 40px;">
    <h2>💻 코딩 연습</h2><br>
    <div class="code-layout">
      <!-- 1. PDF -->
      <div class="panel-box">
        <div class="panel-header">📄 문제 PDF
          <label class="btn-run" style="margin-left:auto; cursor:pointer;">+ 업로드
            <input type="file" id="pdfUpload" accept="application/pdf" style="display:none;">
          </label>
        </div>
        <div id="pdfPlaceholder" style="padding:20px; text-align:center;">PDF를 올려주세요.</div>
        <iframe id="pdfViewer" style="width:100%; height:100%; display:none;"></iframe>
      </div>

      <!-- 2. 에디터 -->
      <div class="panel-box">
        <div class="panel-header">
          <select id="langSelect">
            <option value="71">Python</option>
            <option value="63">JavaScript</option>
          </select>
          <button class="btn-run" onclick="runCodeWithJudge0()">▶ 실행</button>
        </div>
        <textarea id="codeEditor" class="code-editor">print("Hello World")</textarea>
        <div id="editorOutput" class="editor-output">실행 결과를 대기중입니다.</div>
      </div>

      <!-- 3. AI -->
      <div class="panel-box">
        <div class="panel-header">🤖 AI Copilot</div>
        <div style="padding:20px;">AI 분석 내역이 표시됩니다.</div>
      </div>
    </div>
  </div>

  <!-- 공통 토스트 -->
  <div id="toast" class="toast"><span id="toastIcon"></span><span id="toastMsg"></span></div>

  <!-- 분리된 JS 파일들 불러오기 -->
  <script src="/js/common.js"></script>
  <script src="/js/apikey.js"></script>
  <script src="/js/code.js"></script>
</body>
</html>
